name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev python3

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j2

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: End-to-end failover test
        run: python3 tests/integration_test.py --binary ./build/kvstore_server

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev

      - name: Configure with sanitizers
        run: cmake -S . -B build-san -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build-san -j2

      - name: Unit tests
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest --test-dir build-san --output-on-failure
